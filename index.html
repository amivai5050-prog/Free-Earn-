<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>RewardVerse</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <h1>RewardVerse</h1>
  <p id="user">Loading...</p>

  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();

    const user = tg.initDataUnsafe.user;

    document.getElementById("user").innerText =
      user ? `Hello ${user.first_name}` : "Telegram user not found";
  </script>
</body>
</html>
